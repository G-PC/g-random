<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дополнительные инструменты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.2rem;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .card-desc {
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .install-card {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
        }

        .install-card .card-title,
        .install-card .card-desc {
            color: white;
        }

        .install-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) {
            .cards {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card {
                flex: 1;
                min-width: 280px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- ПРОВЕРКА ИНТЕРНЕТА -->
    <script>
        (function() {
            function showOfflinePage() {
                document.body.innerHTML = '';
                document.body.style.margin = '0';
                document.body.style.padding = '0';
                const div = document.createElement('div');
                div.style.cssText = 'display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;';
                div.innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 20px;">📡</div>
                    <h1 style="font-size: 1.8rem; margin-bottom: 12px;">Нет соединения</h1>
                    <p style="max-width: 280px; opacity: 0.9; margin-bottom: 24px;">Пожалуйста, проверьте интернет-подключение и попробуйте снова.</p>
                    <button id="reloadBtn" style="background: white; color: #667eea; border: none; padding: 12px 28px; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer;">Обновить</button>
                    <p style="margin-top: 24px; font-size: 0.8rem; opacity: 0.7;">Некоторые функции могут быть недоступны без интернета</p>
                `;
                document.body.appendChild(div);
                const btn = document.getElementById('reloadBtn');
                if (btn) btn.onclick = () => location.reload();
            }
            if (!navigator.onLine) showOfflinePage();
            window.addEventListener('offline', () => showOfflinePage());
            window.addEventListener('online', () => location.reload());
        })();
    </script>

    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        <h1>⚙️ Дополнительное</h1>
        <div class="subtitle">Полезные материалы и инструменты</div>
        <div class="cards" id="cardsContainer">
            <a href="MAFIA_roles.pdf" class="card" target="_blank">
                <div class="card-icon">📖</div>
                <div class="card-title">Описание ролей</div>
                <div class="card-desc">Описание ролей для игры в Мафию в порядке их действий (PDF)</div>
            </a>
            <a href="https://forms.gle/PZy9AYrx8xLGtZmh8" class="card" target="_blank">
                <div class="card-icon">📧</div>
                <div class="card-title">Обратная связь</div>
                <div class="card-desc">Сообщите о проблеме, задайте вопрос или поделитесь идеей</div>
            </a>
            <div id="installCard" class="card install-card" style="display: none;">
                <div id="installIcon" class="card-icon">📲</div>
                <div id="installTitle" class="card-title">Установить приложение</div>
                <div id="installDesc" class="card-desc">Скачайте APK и пользуйтесь сайтом как приложением</div>
            </div>
        </div>
    </div>

    <script>
        function getDeviceType() {
            const ua = navigator.userAgent.toLowerCase();
            const isAndroid = ua.includes('android');
            const isIOS = /iphone|ipad|ipod/.test(ua);
            const isWebView = ua.includes('wv') || (ua.includes('android') && !ua.includes('chrome'));
            return { isAndroid, isIOS, isWebView };
        }

        function setupInstallButton() {
            const installCard = document.getElementById('installCard');
            if (!installCard) return;
            
            const { isAndroid, isIOS, isWebView } = getDeviceType();
            
            if (isWebView) {
                installCard.style.display = 'none';
                return;
            }
            
            installCard.style.display = 'block';
            
            if (isAndroid) {
                document.getElementById('installIcon').textContent = '📲';
                document.getElementById('installTitle').textContent = 'Установить приложение';
                document.getElementById('installDesc').textContent = 'Скачайте APK-файл и установите на телефон';
                installCard.onclick = () => window.open('https://g-wpi.github.io/g-random/G-RANDOM_android.apk', '_blank');
            } 
            else if (isIOS) {
                document.getElementById('installIcon').textContent = '📱';
                document.getElementById('installTitle').textContent = 'Добавить на главный экран';
                document.getElementById('installDesc').textContent = 'Как установить наш сайт как приложение на iPhone';
                installCard.onclick = () => alert('Нажмите «Поделиться» → «На экран «Домой»»');
            }
            else {
                document.getElementById('installIcon').textContent = '💻';
                document.getElementById('installTitle').textContent = 'Установка не требуется';
                document.getElementById('installDesc').textContent = 'Вы на компьютере — просто пользуйтесь сайтом';
                installCard.onclick = () => alert('На компьютере установка не требуется.');
            }
        }

        setupInstallButton();
    </script>
</body>
</html>
