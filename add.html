<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Дополнительные инструменты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 40px;
            margin-bottom: 24px;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.2rem;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .card-desc {
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Стиль для кнопки установки */
        .install-card {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
        }

        .install-card .card-title,
        .install-card .card-desc {
            color: white;
        }

        .install-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @media (min-width: 768px) {
            .cards {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card {
                flex: 1;
                min-width: 280px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        <h1>⚙️ Дополнительное</h1>
        <div class="subtitle">Полезные материалы и инструменты</div>
        <div class="cards" id="cardsContainer">
            <a href="roles-description.pdf" class="card" target="_blank">
                <div class="card-icon">📖</div>
                <div class="card-title">Описание ролей</div>
                <div class="card-desc">Описание ролей для игры в Мафию в порядке их действий (PDF)</div>
            </a>
            <a href="https://forms.gle/PZy9AYrx8xLGtZmh8" class="card" target="_blank">
                <div class="card-icon">📧</div>
                <div class="card-title">Обратная связь</div>
                <div class="card-desc">Сообщите о проблеме, задайте вопрос или поделитесь идеей</div>
            </a>
            <!-- Кнопка установки приложения (будет показана только в браузере) -->
            <div id="installCard" class="card install-card" style="display: none;">
                <div class="card-icon">📲</div>
                <div class="card-title">Установить приложение</div>
                <div class="card-desc">Скачайте APK и пользуйтесь сайтом как приложением</div>
            </div>
        </div>
    </div>

    <script>
        // Определяем, открыт ли сайт внутри APK (WebView)
        function isInWebView() {
            const userAgent = navigator.userAgent.toLowerCase();
            // Проверяем признаки WebView
            const isWebView = (
                (userAgent.includes('wv') ||                           // Android WebView
                 (userAgent.includes('android') && !userAgent.includes('chrome')) || // Android без Chrome
                 (userAgent.includes('iphone') && !userAgent.includes('safari')))    // iOS без Safari
            );
            return isWebView;
        }

        // Показываем кнопку установки, если не в WebView
        if (!isInWebView()) {
            const installCard = document.getElementById('installCard');
            installCard.style.display = 'block';
            
            // Добавляем обработчик нажатия
            installCard.addEventListener('click', function() {
                // Замените ссылку на вашу реальную ссылку для скачивания APK
                window.open('https://g-wpi.github.io/g-random/app-release.apk', '_blank');
            });
        }
    </script>
</body>
</html>
