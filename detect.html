<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка...</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .loader {
            text-align: center;
            color: white;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Загрузка...</p>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tool = urlParams.get('tool');
        
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|Windows Phone/i.test(navigator.userAgent) || window.innerWidth < 768;
        
        let page = '';
        if (tool === 'roles') page = isMobile ? 'm-roles.html' : 'roles.html';
        else if (tool === 'wheel') page = isMobile ? 'm-fortune.html' : 'fortune.html';
        else if (tool === 'elimination') page = isMobile ? 'm-elimination.html' : 'elimination.html';
        else if (tool === 'randomus') page = isMobile ? 'm-randomus.html' : 'randomus.html';
        else window.location.href = 'index.html';
        
        window.location.href = page;
    </script>
</body>
</html>
