<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Дополнительные инструменты</title>
    <link rel="icon" type="image/x-icon" href="/g-random/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 100%;
            width: 100%;
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.97);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.1s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        .card:active {
            transform: scale(0.98);
            background: #f8fafc;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 6px;
        }

        .card-desc {
            color: #6b7280;
            font-size: 0.85rem;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<script>
    if (!navigator.onLine) {
        document.body.innerHTML = `
            <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; font-family: system-ui; text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                <div style="font-size: 4rem; margin-bottom: 20px;">📡</div>
                <h1 style="font-size: 1.8rem; margin-bottom: 12px;">Нет соединения</h1>
                <p style="max-width: 280px; margin-bottom: 24px;">Пожалуйста, проверьте интернет-подключение и попробуйте снова.</p>
                <button onclick="location.reload()" style="background: white; color: #667eea; border: none; padding: 12px 28px; border-radius: 40px; font-size: 1rem; font-weight: 600;">Обновить</button>
                <p style="margin-top: 24px; font-size: 0.8rem;">Для первого запуска требуется интернет</p>
            </div>
        `;
        throw new Error('offline');
    }
</script>

    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        <h1>⚙️ Дополнительное</h1>
        <div class="subtitle">Полезные материалы и инструменты</div>
        <div class="cards">
            <a href="MAFIA_roles.pdf" class="card" target="_blank">
                <div class="card-icon">📖</div>
                <div class="card-title">Описание ролей</div>
                <div class="card-desc">Описание ролей для игры в Мафию в порядке их действий (PDF)</div>
            </a>
            <a href="https://forms.gle/PZy9AYrx8xLGtZmh8" class="card" target="_blank">
                <div class="card-icon">📧</div>
                <div class="card-title">Обратная связь</div>
                <div class="card-desc">Сообщите о проблеме, задайте вопрос или поделитесь идеей</div>
            </a>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/g-random/sw.js').catch(console.log);
        }
    </script>
</body>
</html>
