<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Дополнительные инструменты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 100%;
            width: 100%;
        }

        .back-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .back-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.97);
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 1.8rem;
            margin-bottom: 12px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.1s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
            -webkit-tap-highlight-color: transparent;
        }

        .card:active {
            transform: scale(0.98);
            background: #f8fafc;
        }

        .card-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 6px;
        }

        .card-desc {
            color: #6b7280;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* Стиль для кнопки установки */
        .install-card {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
        }

        .install-card .card-title,
        .install-card .card-desc {
            color: white;
        }

        .install-card:active {
            background: linear-gradient(135deg, #43a047 0%, #1b5e20 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>
        <h1>⚙️ Дополнительное</h1>
        <div class="subtitle">Полезные материалы и инструменты</div>
        <div class="cards" id="cardsContainer">
            <a href="roles-description.pdf" class="card" target="_blank">
                <div class="card-icon">📖</div>
                <div class="card-title">Описание ролей</div>
                <div class="card-desc">Описание ролей для игры в Мафию в порядке их действий (PDF)</div>
            </a>
            <a href="https://forms.gle/PZy9AYrx8xLGtZmh8" class="card" target="_blank">
                <div class="card-icon">📧</div>
                <div class="card-title">Обратная связь</div>
                <div class="card-desc">Сообщите о проблеме, задайте вопрос или поделитесь идеей</div>
            </a>
            <!-- Кнопка установки приложения (будет показана только в браузере) -->
            <div id="installCard" class="card install-card" style="display: none;">
                <div class="card-icon">📲</div>
                <div class="card-title">Установить приложение</div>
                <div class="card-desc">Скачайте APK и пользуйтесь сайтом как приложением</div>
            </div>
        </div>
    </div>

    <script>
        // Определяем, открыт ли сайт внутри APK (WebView)
        function isInWebView() {
            const userAgent = navigator.userAgent.toLowerCase();
            const isWebView = (
                (userAgent.includes('wv') ||
                 (userAgent.includes('android') && !userAgent.includes('chrome')) ||
                 (userAgent.includes('iphone') && !userAgent.includes('safari')))
            );
            return isWebView;
        }

        // Показываем кнопку установки, если не в WebView
        if (!isInWebView()) {
            const installCard = document.getElementById('installCard');
            installCard.style.display = 'block';
            
            installCard.addEventListener('click', function() {
                // Замените ссылку на вашу реальную ссылку для скачивания APK
                window.open('https://g-wpi.github.io/g-random/app-release.apk', '_blank');
            });
        }
    </script>
</body>
</html>
