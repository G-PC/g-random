<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Рандомайзер ролей</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .loader {
            background: white;
            border-radius: 28px;
            padding: 32px;
            text-align: center;
            max-width: 300px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #1e88e5;
            border-radius: 50%;
            margin: 0 auto 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Определяем ваше устройство...</p>
        <p style="font-size: 12px; color: #6c757d;">Перенаправление через секунду</p>
    </div>

    <script>
        // Функция определения типа устройства
        function detectDevice() {
            // Получаем ширину экрана
            const width = window.innerWidth;
            
            // Проверяем User Agent (какой браузер сообщает)
            const userAgent = navigator.userAgent.toLowerCase();
            
            // Проверяем, есть ли touch-экран (у телефонов и планшетов)
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            
            // Признаки мобильного устройства
            const isMobileUA = /android|webos|iphone|ipad|ipod|blackberry|windows phone/i.test(userAgent);
            
            // Если ширина меньше 768px ИЛИ (есть touch И userAgent мобильный) — считаем мобильным
            // Планшеты с большой диагональю отправляем на десктопную версию (она адаптивная)
            if (width < 768 || (isTouch && isMobileUA)) {
                return 'mobile';
            } else {
                return 'desktop';
            }
        }
        
        // Определяем устройство
        const device = detectDevice();
        
        // Перенаправляем на нужную версию
        if (device === 'mobile') {
            window.location.href = 'mobile.html';
        } else {
            window.location.href = 'desktop.html';
        }
    </script>
</body>
</html>
