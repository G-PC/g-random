<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Рандомайзер — выбор режима</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .menu-container {
            max-width: 1000px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 16px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 28px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .card-desc {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        @media (min-width: 768px) {
            .cards {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
            }
            .card {
                flex: 1;
                min-width: 220px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>🎲 Рандомайзер</h1>
        <div class="subtitle">Выберите инструмент</div>
        <div class="cards">
            <a href="detect.html?tool=roles" class="card">
                <div class="card-icon">🎭</div>
                <div class="card-title">Рандомайзер ролей</div>
                <div class="card-desc">Распределение ролей для Мафии и других игр</div>
            </a>
            <a href="detect.html?tool=wheel" class="card">
                <div class="card-icon">🎡</div>
                <div class="card-title">Колесо фортуны</div>
                <div class="card-desc">Случайный выбор слова или имени из списка</div>
            </a>
            <a href="detect.html?tool=elimination" class="card">
                <div class="card-icon">🔄</div>
                <div class="card-title">Колесо на выбывание</div>
                <div class="card-desc">Выпавшие варианты удаляются</div>
            </a>
            <a href="detect.html?tool=randomus" class="card">
                <div class="card-icon">🎲</div>
                <div class="card-title">Генератор случайных чисел</div>
                <div class="card-desc">Генерация чисел от 1 до 1 000 000</div>
            </a>
        </div>
    </div>
</body>
</html>
