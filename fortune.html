<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо фортуны — Десктоп</title>
    <link rel="icon" type="image/x-icon" href="/g-random/favicon.ico">
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 28px 32px;
        }
        .back-btn {
            display: inline-block;
            background: #64748b;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: #475569;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
        }
        .two-columns {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .wheel-panel {
            flex: 1;
            min-width: 300px;
            text-align: center;
            position: relative;
        }
        .controls-panel {
            flex: 0.8;
            min-width: 280px;
        }
        .wheel-container {
            position: relative;
            display: inline-block;
        }
        canvas {
            background: #f8fafc;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            height: auto;
            cursor: pointer;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid #ef4444;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .pointer:after {
            content: "▼";
            position: absolute;
            top: -48px;
            left: -12px;
            font-size: 24px;
            color: #ef4444;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
            height: 200px;
        }
        button {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        button:hover {
            background: #0b5e8a;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #eef2ff;
            border-radius: 20px;
            text-align: center;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e40af;
            word-break: break-word;
        }
        .history {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            background: #f1f5f9;
            margin: 5px 0;
            padding: 8px;
            border-radius: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 12px 0;
            cursor: pointer;
        }
        .hint {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← На главную</a>
    <h1>🎡 Колесо фортуны</h1>
    
    <div class="two-columns">
        <div class="wheel-panel">
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
            </div>
            <button id="spinBtn">🔀 Крутить колесо</button>
        </div>
        <div class="controls-panel">
            <label>📝 Варианты (каждый с новой строки)</label>
            <textarea id="optionsInput" placeholder="Герман&#10;Эмир x2&#10;Артур&#10;Андрей x3"></textarea>
            <div class="hint">📌 Можно указывать множитель: «Андрей x2», «Мафия *3» — тогда вариант займёт больше места на колесе</div>
            
            <div class="checkbox-label">
                <input type="checkbox" id="removeAfterSpin">
                <label>🗑️ Удалять выпавший вариант</label>
            </div>
            
            <button id="updateWheelBtn">🔄 Обновить колесо</button>
            
            <div class="result">
                <div style="font-size: 0.9rem; color: #4b5563;">Выпало:</div>
                <div id="resultDisplay" class="result-value">—</div>
            </div>
            
            <div class="history">
                <div style="font-weight: 600; margin-bottom: 8px;">📜 История выпадений</div>
                <div id="historyList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const optionsInput = document.getElementById('optionsInput');
    const spinBtn = document.getElementById('spinBtn');
    const updateWheelBtn = document.getElementById('updateWheelBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const historyList = document.getElementById('historyList');
    const removeAfterSpin = document.getElementById('removeAfterSpin');
    
    // Храним варианты с их множителями
    let items = [];      // [{ name: "Герман", weight: 1 }, ...]
    let rawOptions = []; // для сохранения в textarea
    let currentAngle = 0;
    let spinning = false;
    let animFrame = null;
    let history = [];
    
    // Парсинг строки: "Андрей x3" -> { name: "Андрей", weight: 3 }
    function parseOption(line) {
        let trimmed = line.trim();
        if (trimmed === "") return null;
        
        let match = trimmed.match(/^(.*?)\s*[хx*]\s*(\d+)$/i);
        if (match) {
            let name = match[1].trim();
            let weight = parseInt(match[2], 10);
            if (isNaN(weight) || weight < 1) weight = 1;
            return { name: name, weight: weight };
        } else {
            return { name: trimmed, weight: 1 };
        }
    }
    
    function parseOptions() {
        let lines = optionsInput.value.split(/\r?\n/);
        let newItems = [];
        for (let line of lines) {
            let item = parseOption(line);
            if (item) newItems.push(item);
        }
        return newItems;
    }
    
    // Преобразование items в строку для отображения в textarea
    function itemsToString(items) {
        return items.map(item => item.weight > 1 ? `${item.name} x${item.weight}` : item.name).join('\n');
    }
    
    function drawWheel() {
        if (!ctx) return;
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        const r = w * 0.45;
        
        ctx.clearRect(0, 0, w, h);
        
        if (items.length === 0) {
            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#64748b';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('Добавьте варианты', cx - 100, cy);
            return;
        }
        
        // Вычисляем общее количество секторов (сумма весов)
        let totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        let angleStep = (2 * Math.PI) / totalWeight;
        
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#F0E68C', '#87CEEB', '#FFB347', '#77DD77'];
        
        let startAngle = currentAngle;
        let sectorIndex = 0;
        
        for (let i = 0; i < items.length; i++) {
            let item = items[i];
            let sectorCount = item.weight;
            let sectorColor = colors[i % colors.length];
            
            for (let s = 0; s < sectorCount; s++) {
                let endAngle = startAngle + angleStep;
                
                ctx.beginPath();
                ctx.arc(cx, cy, r, startAngle, endAngle);
                ctx.lineTo(cx, cy);
                ctx.fillStyle = sectorColor;
                ctx.fill();
                
                // Рисуем текст только в первом секторе варианта (чтобы не повторять)
                if (s === 0) {
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(startAngle + angleStep / 2);
                    ctx.fillStyle = '#1f2937';
                    ctx.font = 'bold 14px sans-serif';
                    let text = item.name;
                    if (text.length > 20) text = text.slice(0, 17) + '...';
                    ctx.fillText(text, r * 0.65, 5);
                    ctx.restore();
                }
                
                startAngle = endAngle;
                sectorIndex++;
            }
        }
        
        // Центральный кружок
        ctx.beginPath();
        ctx.arc(cx, cy, 15, 0, 2 * Math.PI);
        ctx.fillStyle = '#ffffff';
        ctx.fill();
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    
    function getCurrentOption() {
        if (items.length === 0) return null;
        
        let totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        let angleStep = (2 * Math.PI) / totalWeight;
        const arrowAngle = -Math.PI / 2;
        
        let raw = (arrowAngle - currentAngle + 2 * Math.PI) % (2 * Math.PI);
        let sectorIndex = Math.floor(raw / angleStep) % totalWeight;
        
        // Находим, какому варианту принадлежит этот сектор
        let accum = 0;
        for (let item of items) {
            if (sectorIndex < accum + item.weight) {
                return item.name;
            }
            accum += item.weight;
        }
        return items[0]?.name;
    }
    
    function spinWheel() {
        if (spinning || items.length === 0) return;
        spinning = true;
        
        const duration = 2000;
        const startTime = performance.now();
        const startAngle = currentAngle;
        const fullTurns = 8 + Math.random() * 5;
        const randomOffset = Math.random() * 2 * Math.PI;
        const targetDelta = fullTurns * 2 * Math.PI + randomOffset;
        
        function animate(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / duration);
            const ease = 1 - Math.pow(1 - t, 3);
            currentAngle = startAngle + targetDelta * ease;
            drawWheel();
            
            if (t < 1) {
                animFrame = requestAnimationFrame(animate);
            } else {
                currentAngle = (startAngle + targetDelta) % (2 * Math.PI);
                drawWheel();
                spinning = false;
                const result = getCurrentOption();
                if (result) {
                    resultDisplay.textContent = result;
                    history.unshift(result);
                    if (history.length > 20) history.pop();
                    updateHistoryDisplay();
                    
                    if (removeAfterSpin.checked) {
                        // Удаляем вариант целиком (все его сектора)
                        const index = items.findIndex(item => item.name === result);
                        if (index !== -1) {
                            items.splice(index, 1);
                            optionsInput.value = itemsToString(items);
                            if (items.length === 0) {
                                resultDisplay.textContent = 'Все варианты выбыли!';
                            }
                            drawWheel();
                        }
                    }
                }
                animFrame = null;
            }
        }
        
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = requestAnimationFrame(animate);
    }
    
    function updateHistoryDisplay() {
        if (history.length === 0) {
            historyList.innerHTML = '<div style="color: #6c757d;">Пока пусто</div>';
        } else {
            historyList.innerHTML = history.map(h => `<div class="history-item">• ${escapeHtml(h)}</div>`).join('');
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    
    function updateWheel() {
        items = parseOptions();
        history = [];
        updateHistoryDisplay();
        resultDisplay.textContent = '—';
        drawWheel();
    }
    
    // Пример с множителями
    optionsInput.value = "Герман\nЭмир x2\nАртур\nАндрей x3";
    updateWheel();
    
    spinBtn.addEventListener('click', spinWheel);
    updateWheelBtn.addEventListener('click', updateWheel);
    canvas.addEventListener('click', spinWheel);
    
    window.addEventListener('resize', () => drawWheel());
</script>
</body>
</html>
