<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо на выбывание — Десктоп</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 28px 32px;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0 0 8px 0;
        }
        .back-btn {
            display: inline-block;
            background: #64748b;
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: #475569;
        }
        .two-columns {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .wheel-panel {
            flex: 1;
            min-width: 300px;
            text-align: center;
            position: relative;
        }
        .controls-panel {
            flex: 0.8;
            min-width: 280px;
        }
        .wheel-container {
            position: relative;
            display: inline-block;
        }
        canvas {
            background: #f8fafc;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            height: auto;
            cursor: pointer;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 50px solid #ef4444;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .pointer:after {
            content: "▼";
            position: absolute;
            top: -48px;
            left: -12px;
            font-size: 24px;
            color: #ef4444;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #cbd5e1;
            font-family: monospace;
            font-size: 0.9rem;
            resize: vertical;
            height: 200px;
        }
        button {
            background: #1e88e5;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }
        button:hover {
            background: #0b5e8a;
        }
        .reset-btn {
            background: #ef4444;
        }
        .reset-btn:hover {
            background: #dc2626;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #eef2ff;
            border-radius: 20px;
            text-align: center;
        }
        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e40af;
            word-break: break-word;
        }
        .eliminated-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        .eliminated-item {
            background: #fee2e2;
            margin: 5px 0;
            padding: 8px;
            border-radius: 10px;
            text-decoration: line-through;
            color: #991b1b;
        }
        .remaining-count {
            background: #e0e7ff;
            padding: 8px 12px;
            border-radius: 20px;
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-btn">← На главную</a>
    <h1>🔄 Колесо на выбывание</h1>
    <p style="color: #4b5563; margin-bottom: 20px;">Каждый выпавший вариант удаляется из списка и больше не участвует</p>
    
    <div class="two-columns">
        <div class="wheel-panel">
            <div class="wheel-container" style="position: relative; display: inline-block;">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
            </div>
            <button id="spinBtn">🎡 Крутить колесо (на выбывание)</button>
            <button id="resetBtn" class="reset-btn">🔄 Сбросить и восстановить все варианты</button>
        </div>
        <div class="controls-panel">
            <label>📝 Варианты (каждый с новой строки)</label>
            <textarea id="optionsInput" placeholder="Игрок 1&#10;Игрок 2&#10;Игрок 3&#10;Игрок 4"></textarea>
            <button id="updateWheelBtn">🔄 Обновить колесо</button>
            
            <div class="result">
                <div style="font-size: 0.9rem; color: #4b5563;">Выпал(а):</div>
                <div id="resultDisplay" class="result-value">—</div>
            </div>
            
            <div class="remaining-count" id="remainingCount"></div>
            
            <div class="eliminated-list">
                <div style="font-weight: 600; margin-bottom: 8px;">❌ Выбывшие</div>
                <div id="eliminatedList"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const optionsInput = document.getElementById('optionsInput');
    const spinBtn = document.getElementById('spinBtn');
    const resetBtn = document.getElementById('resetBtn');
    const updateWheelBtn = document.getElementById('updateWheelBtn');
    const resultDisplay = document.getElementById('resultDisplay');
    const eliminatedListDiv = document.getElementById('eliminatedList');
    const remainingCountSpan = document.getElementById('remainingCount');
    
    let allOptions = [];
    let currentOptions = [];
    let eliminated = [];
    let currentRotation = 0;
    let spinning = false;
    let animationId = null;
    
    function parseOptions() {
        let raw = optionsInput.value.split(/\r?\n/);
        return raw.filter(opt => opt.trim().length > 0);
    }
    
    function drawWheel() {
        if (!canvas || !ctx) return;
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = width * 0.45;
        
        ctx.clearRect(0, 0, width, height);
        
        if (currentOptions.length === 0) {
            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = '#64748b';
            ctx.font = 'bold 16px sans-serif';
            ctx.fillText('Все выбыли!', centerX - 70, centerY);
            return;
        }
        
        const angleStep = (2 * Math.PI) / currentOptions.length;
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#F0E68C', '#87CEEB', '#FFB347', '#77DD77', '#FF9999', '#99CC99'];
        
        for (let i = 0; i < currentOptions.length; i++) {
            const startAngle = i * angleStep + currentRotation;
            const endAngle = (i + 1) * angleStep + currentRotation;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.lineTo(centerX, centerY);
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(startAngle + angleStep / 2);
            ctx.fillStyle = '#1f2937';
            ctx.font = 'bold 14px sans-serif';
            let text = currentOptions[i];
            if (text.length > 20) text = text.slice(0, 17) + '...';
            ctx.fillText(text, radius * 0.65, 5);
            ctx.restore();
        }
    }
    
    function getCurrentOption() {
        if (currentOptions.length === 0) return null;
        // Стрелка сверху (угол -90 градусов)
        const pointerAngle = -Math.PI / 2;
        const angleStep = (2 * Math.PI) / currentOptions.length;
        let rawAngle = (pointerAngle - currentRotation + 2 * Math.PI) % (2 * Math.PI);
        let index = Math.floor(rawAngle / angleStep) % currentOptions.length;
        return currentOptions[index];
    }
    
    function updateDisplay() {
        remainingCountSpan.innerHTML = `🎯 Осталось: ${currentOptions.length}`;
        
        if (eliminated.length === 0) {
            eliminatedListDiv.innerHTML = '<div style="color: #6c757d;">Пока никто не выбыл</div>';
        } else {
            eliminatedListDiv.innerHTML = eliminated.map(e => `<div class="eliminated-item">• ${escapeHtml(e)}</div>`).join('');
        }
        
        if (currentOptions.length === 0) {
            resultDisplay.textContent = 'Игра окончена!';
            spinBtn.disabled = true;
        } else {
            spinBtn.disabled = false;
        }
    }
    
    function spinWheel() {
        if (spinning || currentOptions.length === 0) return;
        spinning = true;
        const spinDuration = 2000;
        const startTime = performance.now();
        const startRotation = currentRotation;
        const spins = 8 * Math.PI;
        const targetRotation = startRotation + spins + Math.random() * 2 * Math.PI;
        
        function animateSpin(now) {
            const elapsed = now - startTime;
            let t = Math.min(1, elapsed / spinDuration);
            const easeOut = 1 - Math.pow(1 - t, 3);
            currentRotation = startRotation + targetRotation * easeOut;
            drawWheel();
            
            if (t < 1) {
                animationId = requestAnimationFrame(animateSpin);
            } else {
                currentRotation = targetRotation % (2 * Math.PI);
                drawWheel();
                spinning = false;
                const result = getCurrentOption();
                if (result) {
                    resultDisplay.textContent = result;
                    const index = currentOptions.indexOf(result);
                    if (index !== -1) {
                        currentOptions.splice(index, 1);
                        eliminated.unshift(result);
                    }
                    updateDisplay();
                    if (currentOptions.length > 0) {
                        drawWheel();
                    } else {
                        resultDisplay.textContent = '🏆 Все выбыли!';
                        drawWheel();
                    }
                }
            }
        }
        
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(animateSpin);
    }
    
    function resetGame() {
        currentOptions = [...allOptions];
        eliminated = [];
        currentRotation = 0;
        resultDisplay.textContent = '—';
        updateDisplay();
        drawWheel();
    }
    
    function updateWheel() {
        allOptions = parseOptions();
        currentOptions = [...allOptions];
        eliminated = [];
        currentRotation = 0;
        resultDisplay.textContent = '—';
        updateDisplay();
        drawWheel();
        
        if (allOptions.length === 0) {
            resultDisplay.textContent = '—';
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
    }
    
    optionsInput.value = "Герман\nЭмир\nАртур\nАндрей\nМаксим";
    updateWheel();
    
    spinBtn.addEventListener('click', spinWheel);
    resetBtn.addEventListener('click', resetGame);
    updateWheelBtn.addEventListener('click', updateWheel);
    canvas.addEventListener('click', spinWheel);
    
    window.addEventListener('resize', () => drawWheel());
</script>
</body>
</html>
